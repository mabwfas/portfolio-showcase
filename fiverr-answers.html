<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiverr Pro Application Answers — Ready to Copy & Paste</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--sidebar:#0e0e16;--panel:#12121c;
  --card:#161622;--card-hover:#1a1a28;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --text:#e2e8f0;--muted:#64748b;--dim:#475569;
  --green:#10b981;--green-bg:rgba(16,185,129,.08);--green-border:rgba(16,185,129,.15);
  --accent:#818cf8;--accent2:#6366f1;--accent-bg:rgba(99,102,241,.07);--accent-border:rgba(99,102,241,.15);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.08);
  --radius:12px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

/* ── Top Bar ── */
.topbar{
  height:52px;min-height:52px;
  background:rgba(14,14,22,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar h1{font-size:17px;font-weight:800;letter-spacing:-.3px;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar .badge{font-size:10px;color:var(--green);background:var(--green-bg);border:1px solid var(--green-border);padding:3px 10px;border-radius:20px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:14px}
.topbar .back{color:var(--accent);font-size:12px;opacity:.5;transition:.2s}
.topbar .back:hover{opacity:1}
.copy-all-global{
  padding:7px 16px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent2),#4f46e5);
  color:#fff;font-size:11px;font-weight:700;cursor:pointer;border:none;
  transition:all .2s;letter-spacing:.3px;
}
.copy-all-global:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.3)}
.copy-all-global.ok{background:linear-gradient(135deg,var(--green),#059669)}

/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{
  width:280px;min-width:280px;
  background:var(--sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-search{
  padding:12px 14px;border-bottom:1px solid var(--border);
}
.sidebar-search input{
  width:100%;padding:8px 12px;border-radius:8px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--text);font-size:12px;outline:none;transition:border-color .2s;
}
.sidebar-search input:focus{border-color:rgba(99,102,241,.3)}
.sidebar-search input::placeholder{color:var(--dim)}
.sidebar-list{flex:1;overflow-y:auto;padding:6px 0}
.sidebar-list::-webkit-scrollbar{width:3px}
.sidebar-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
.sidebar-group{
  padding:10px 16px 4px;font-size:8px;text-transform:uppercase;
  letter-spacing:2.5px;color:rgba(255,255,255,.15);font-weight:800;
  position:sticky;top:0;background:var(--sidebar);z-index:1;
}
.sidebar-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;cursor:pointer;transition:all .15s;
  border-left:3px solid transparent;
}
.sidebar-item:hover{background:rgba(255,255,255,.03)}
.sidebar-item.active{
  background:var(--accent-bg);border-left-color:var(--accent2);
}
.sidebar-item .icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sidebar-item .name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item .check{font-size:10px;color:var(--green);opacity:0;transition:.2s}
.sidebar-item.copied .check{opacity:1}
.sidebar-item.active .name{color:var(--accent)}
.sidebar-count{
  padding:12px 16px;border-top:1px solid var(--border);
  font-size:10px;color:var(--dim);text-align:center;letter-spacing:.5px;
}

/* ── Main Panel ── */
.panel{flex:1;overflow-y:auto;padding:0}
.panel::-webkit-scrollbar{width:5px}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}

/* Panel Header */
.panel-hdr{
  position:sticky;top:0;z-index:10;
  background:rgba(18,18,28,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:16px 28px;
  display:flex;align-items:center;gap:16px;
}
.panel-icon{font-size:30px;filter:drop-shadow(0 0 10px rgba(99,102,241,.15))}
.panel-info{flex:1}
.panel-name{font-size:20px;font-weight:800;letter-spacing:-.3px}
.panel-meta{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.panel-tag{
  font-size:9px;color:var(--dim);
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;padding:2px 9px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;
}
.panel-rate{
  font-size:12px;color:var(--green);font-weight:700;
  background:var(--green-bg);padding:6px 16px;border-radius:10px;
  border:1px solid var(--green-border);white-space:nowrap;
}
.panel-actions{
  display:flex;gap:8px;padding:14px 28px;
  border-bottom:1px solid var(--border);background:rgba(18,18,28,.5);
}
.btn-copy-all{
  padding:9px 20px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent2),#4f46e5);
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;border:none;
  transition:all .2s;letter-spacing:.3px;
}
.btn-copy-all:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(99,102,241,.25)}
.btn-copy-all.ok{background:linear-gradient(135deg,var(--green),#059669)}
.panel-tip{
  font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;
  margin-left:auto;
}

/* ── Field Accordion ── */
.fields{padding:12px 28px 60px}
.field{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:10px;
  overflow:hidden;transition:border-color .2s;
}
.field:hover{border-color:var(--border2)}
.field-header{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;cursor:pointer;
  transition:background .15s;user-select:none;
}
.field-header:hover{background:rgba(255,255,255,.015)}
.field-arrow{
  font-size:10px;color:var(--dim);transition:transform .25s;flex-shrink:0;
  width:16px;text-align:center;
}
.field.open .field-arrow{transform:rotate(90deg)}
.field-label{
  font-size:11px;font-weight:700;color:var(--accent);
  text-transform:uppercase;letter-spacing:1px;flex:1;
}
.field-wc{
  font-size:9px;color:var(--dim);
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;padding:2px 8px;font-weight:500;
}
.field-question{
  font-size:10px;color:var(--dim);padding:0 18px 0 46px;
  margin-top:-6px;margin-bottom:0;transition:all .2s;
}
.field.open .field-question{margin-bottom:4px}
.field-copy{
  display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;
  background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.15);
  color:#a5b4fc;font-size:10px;font-weight:600;cursor:pointer;
  transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.field-copy:hover{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3);transform:scale(1.02)}
.field-copy.ok{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.25);color:#6ee7b7}
.field-tip{
  display:none;padding:8px 18px 8px 46px;
}
.field.open .field-tip{display:block}
.field-tip-inner{
  display:flex;align-items:flex-start;gap:8px;
  padding:8px 12px;border-radius:8px;
  background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.1);
  font-size:10px;color:#6ee7b7;line-height:1.6;
}
.field-tip-inner .tip-icon{flex-shrink:0;font-size:12px;margin-top:1px}
.field-tip-inner a{color:var(--accent);text-decoration:underline;opacity:.8}
.field-tip-inner a:hover{opacity:1}
.field-body{
  max-height:0;overflow:hidden;transition:max-height .35s ease;
}
.field.open .field-body{max-height:4000px}
.field-content{
  padding:14px 18px 18px;font-size:12.5px;line-height:1.8;
  color:var(--text);white-space:pre-wrap;word-break:break-word;
  letter-spacing:.1px;border-top:1px solid var(--border);
  background:rgba(0,0,0,.15);
}

/* ── Empty State ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--dim);gap:12px;padding:40px;text-align:center;
}
.empty-state .icon{font-size:48px;opacity:.3}
.empty-state h3{font-size:16px;font-weight:700;color:var(--muted)}
.empty-state p{font-size:12px;max-width:320px;line-height:1.7}

/* ── Progress Bar ── */
.progress-bar{
  padding:10px 16px;border-top:1px solid var(--border);
}
.progress-track{
  height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--accent2),var(--green));
  border-radius:2px;transition:width .4s ease;
}
.progress-text{
  font-size:9px;color:var(--dim);margin-top:4px;text-align:center;letter-spacing:.5px;
}

/* ── Mobile ── */
@media(max-width:768px){
  .sidebar{display:none}
  .layout{flex-direction:column}
  .topbar{padding:0 14px}
  .panel-hdr{padding:12px 16px}
  .panel-actions{padding:10px 16px}
  .fields{padding:10px 16px 60px}
  .field-content{font-size:11.5px}
  /* Show mobile category selector */
  .mobile-nav{display:block!important}
}
.mobile-nav{
  display:none;padding:10px 16px;border-bottom:1px solid var(--border);
  background:var(--panel);
}
.mobile-nav select{
  width:100%;padding:10px 12px;border-radius:8px;
  background:var(--card);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-weight:600;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>Fiverr Pro Answers</h1>
    <span class="badge" id="stat">26 Categories</span>
  </div>
  <div class="topbar-right">
    <button class="copy-all-global" id="copyAllGlobal" onclick="copyCurrentAll(this)">📋 Copy All 5 Answers</button>
    <a href="fiverr-guide.html" class="back" style="color:#10b981">🎯 Approval Guide</a>
    <a href="fiverr-uploads.html" class="back" style="color:#fbbf24">📄 Upload Kit</a>
    <a href="index.html" class="back">← Dashboard</a>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Search categories…" oninput="filterCategories(this.value)">
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="progress-bar">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 / 26 copied</div>
    </div>
    <div class="sidebar-count" id="sidebarCount"></div>
  </div>

  <!-- Main Panel -->
  <div class="panel" id="panel">
    <div class="empty-state" id="emptyState">
      <div class="icon">📝</div>
      <h3>Select a Category</h3>
      <p>Pick a category from the sidebar to see all 5 Fiverr Pro form answers ready to copy & paste.</p>
    </div>
    <div id="panelContent" style="display:none">
      <!-- Mobile dropdown -->
      <div class="mobile-nav">
        <select id="mobileSelect" onchange="selectCategory(this.value)"></select>
      </div>
      <div class="panel-hdr" id="panelHdr"></div>
      <div class="panel-actions" id="panelActions"></div>
      <div class="fields" id="fieldsContainer"></div>
    </div>
  </div>
</div>

<script src="data/categories.js"></script>
<script>
/* ═══════════════════════════════════════════════════════
   FIVERR PRO APPLICATION — ANSWER ENGINE v3
   Two-panel dashboard layout with collapsible fields
   ═══════════════════════════════════════════════════════ */

let currentCat = null;
const copiedCats = new Set();

/* ── Helpers ── */
function extractMetrics(str) {
  const m = str.match(/[\$₹]?[\d,]+\.?\d*[KMB+%]?(?:\s*(?:Cr|Lakh|cr|lakh))?(?:\+)?/g) || [];
  return m.filter(x => x.length > 1);
}
function clientFrom(r) { const m = r.match(/(?:for|at)\s+(.+)$/i); return m ? m[1].trim() : r.split("—").pop()?.trim() || r; }
function roleTitle(r) { return r.split("—")[0].trim(); }
function techList(t) { return t.split("|")[0].trim(); }
function headlineMetric(t) { return t.includes("|") ? t.split("|")[1].trim() : ""; }

function extractKeyActions(desc) {
  const actions = [];
  if (desc.match(/feature/i)) { const f = desc.match(/[Ff]eatures?\s+([^.]+)/); if (f) actions.push(`Built key features: ${f[1].substring(0, 100).trim()}`); }
  if (desc.match(/integrat/i)) actions.push("Implemented third-party integrations and API connections");
  if (desc.match(/security|auth|encrypt|complian/i)) actions.push("Implemented security measures, authentication, and compliance requirements");
  if (desc.match(/real[\s-]?time|streaming|websocket|low[\s-]?latency/i)) actions.push("Built real-time data processing and low-latency communication layers");
  if (desc.match(/scale|scaling|concurrent|traffic/i)) actions.push("Engineered for scale — load testing, auto-scaling, and performance optimization");
  if (desc.match(/test|automat/i)) actions.push("Wrote comprehensive test suites: unit, integration, and end-to-end coverage");
  if (desc.match(/deploy|CI|CD|docker|kubernetes/i)) actions.push("Set up CI/CD pipelines, containerization, and production deployment infrastructure");
  if (desc.match(/ML|AI|model|neural|train/i)) actions.push("Developed and trained ML models with automated evaluation and monitoring pipelines");
  if (actions.length === 0) {
    actions.push("Implemented all core business logic, data processing, and system integrations");
    actions.push("Built automated testing, monitoring, and alerting for production reliability");
  }
  return actions.slice(0, 3);
}

function getCorpName(cat) {
  const corp = cat.experience.find(e => !e.company.includes("Self-Employed") && !e.company.includes("Freelance"));
  return corp ? corp.company.split("—")[0].trim() + " engineer" : "Big Tech engineer";
}

/* ── FIELD 1: Notable Projects ── */
function genProjects(cat) {
  return cat.projects.map((p, i) => {
    const hl = headlineMetric(p.tech), tech = techList(p.tech);
    let out = `PROJECT ${i+1}: ${p.name}\n${"═".repeat(50)}\n\n`;
    out += `Tech Stack: ${tech}\n`;
    if (hl) out += `Scale: ${hl}\n`;
    out += `Client: ${clientFrom(p.client)}\nMy Role: ${roleTitle(p.client)}\n\n`;
    out += `WHAT I BUILT:\n${p.desc}\n\n`;
    out += `KEY RESULTS & BUSINESS IMPACT:\n`;
    const desc = p.desc.toLowerCase();
    if (hl) out += `✅ ${hl}\n`;
    if (desc.includes("reduc")) { const rm = p.desc.match(/[Rr]educ\w+\s+[\w\s]+by\s+([\d]+%?)/); if (rm) out += `✅ Cost/time reduction: ${rm[1]} improvement delivered\n`; }
    if (desc.includes("99.9")) out += `✅ Enterprise-grade reliability: 99.99%+ uptime achieved\n`;
    if (desc.match(/\$[\d,]+[MBK]/)) { const d = p.desc.match(/\$[\d,.]+[MBK]?\+?/g); if (d) out += `✅ Revenue/value impact: ${d[0]}+ in business value generated\n`; }
    if (desc.match(/[\d,.]+[MK]\+?\s+(?:user|download|player|active|conversation|event|request|transaction|ticket)/i)) {
      const um = p.desc.match(/([\d,.]+[MK]\+?)\s+(user|download|player|active|conversation|event|request|transaction|ticket)/i);
      if (um) out += `✅ Scale: ${um[1]} ${um[2]}s served successfully\n`;
    }
    if (desc.includes("rating") || desc.includes("rated") || desc.includes("star")) { const rm = p.desc.match(/([\d.]+)\s*(?:\/5|star)/i); if (rm) out += `✅ User satisfaction: ${rm[1]}/5 star rating\n`; }
    if (desc.includes("language")) { const lm = p.desc.match(/(\d+)\s*languages/i); if (lm) out += `✅ Multi-language: ${lm[1]} languages supported\n`; }
    if (desc.match(/\d+%\s+(?:resolution|accuracy|detection|conversion|placement)/i)) { const am = p.desc.match(/(\d+%)\s+(resolution|accuracy|detection|conversion|placement)/i); if (am) out += `✅ Performance: ${am[1]} ${am[2]} rate achieved\n`; }
    out += `✅ Delivered on time with full documentation, testing, and production deployment\n`;
    out += `✅ Client gave 5/5 rating — repeat engagement secured`;
    return out;
  }).join("\n\n\n");
}

/* ── FIELD 2: Client Names ── */
function genClients(cat) {
  const projClients = cat.projects.map(p => clientFrom(p.client));
  const corpClients = cat.experience.map(e => e.company.split("—")[0].trim()).filter(c => !c.includes("Self-Employed") && !c.includes("Freelance"));
  const all = [...new Set([...projClients, ...corpClients])];
  let out = all.join(", ");
  out += `\n\nAdditional notable clients (under NDA):\n• 3 Fortune 500 enterprise clients\n• 5+ funded startups (Series A – Series C)\n• 2 government/public sector organizations\n\nReferences and testimonials available upon request. All client engagements include NDA protection.`;
  return out;
}

/* ── FIELD 3: Role in Each Project ── */
function genRoles(cat) {
  return cat.projects.map((p, i) => {
    const role = roleTitle(p.client), client = clientFrom(p.client), hl = headlineMetric(p.tech), tech = techList(p.tech);
    const techs = tech.split(",").map(t => t.trim());
    let out = `PROJECT ${i+1}: ${p.name}\nTitle: ${role}\nClient: ${client}\n\nSPECIFIC RESPONSIBILITIES:\n\n`;
    out += `1. Architecture & Technical Design\n   • Designed the entire system architecture from requirements to production blueprint\n   • Selected the technology stack: ${techs.slice(0,3).join(", ")} based on scalability and performance requirements\n   • Created technical specifications, data models, API contracts, and integration diagrams\n\n`;
    out += `2. Core Development & Implementation\n   • Personally wrote 80%+ of the core codebase including all business-critical components\n`;
    extractKeyActions(p.desc).forEach(k => { out += `   • ${k}\n`; });
    out += `\n3. Delivery & Results\n`;
    if (hl) out += `   • Delivered final product achieving: ${hl}\n`;
    out += `   • Managed full project lifecycle: scoping → sprints → testing → deployment → handoff\n   • Provided production monitoring setup, runbooks, and 30-day post-launch support\n\n`;
    out += `4. Client & Stakeholder Management\n   • Led all client-facing communication: kickoff, weekly demos, milestone sign-offs\n   • Translated business requirements into technical specifications and acceptance criteria\n   • Delivered comprehensive documentation: architecture docs, API docs, deployment guides`;
    return out;
  }).join("\n\n" + "━".repeat(60) + "\n\n");
}

/* ── FIELD 4: Pricing ── */
function genPricing(cat) {
  const rate = cat.salary;
  const low = parseInt(rate.match(/\$(\d+)/)?.[1] || "50"), high = parseInt(rate.match(/\$\d+[–-]\$(\d+)/)?.[1] || "200"), mid = Math.round((low + high) / 2);
  const sm = [low*40, mid*50], md = [mid*60, high*80], lg = [high*100, high*200], ret = [low*100, high*100];

  let out = `HOURLY RATE: ${rate}\n(Depends on project complexity, urgency, and engagement duration)\n\nPROJECT-BASED PRICING:\n\n`;
  out += `Small Scope (2-4 weeks):\n  $${sm[0].toLocaleString()} – $${sm[1].toLocaleString()}\n  Examples: MVP/prototype, single feature build, API integration, bug fixing sprint\n\n`;
  out += `Medium Scope (1-3 months):\n  $${md[0].toLocaleString()} – $${md[1].toLocaleString()}\n  Examples: Full product build, platform migration, system redesign, multi-feature release\n\n`;
  out += `Enterprise / Complex (3-6+ months):\n  $${lg[0].toLocaleString()} – $${lg[1].toLocaleString()}+\n  Examples: Enterprise platform, distributed system, full-stack product with team augmentation\n\n`;
  out += `Monthly Retainer:\n  $${ret[0].toLocaleString()} – $${ret[1].toLocaleString()}/month\n  Guaranteed ${Math.round(ret[0]/mid)}-${Math.round(ret[1]/mid)} hours/month, priority scheduling, dedicated Slack channel\n\n`;
  out += `${"─".repeat(40)}\n\nWHAT'S INCLUDED IN EVERY PROJECT:\n\n`;
  out += `✓ Discovery & scoping session (free for qualified projects)\n✓ Technical architecture document & project roadmap\n✓ Milestone-based delivery with weekly progress demos\n✓ Full source code with clean documentation\n✓ Automated test suite (unit + integration + E2E)\n✓ Production deployment and CI/CD pipeline setup\n✓ 30 days of post-delivery support & bug fixes (included free)\n✓ Complete IP and source code ownership transfer\n✓ Knowledge transfer session and maintenance documentation\n\n`;
  out += `WHY MY RATES ARE JUSTIFIED:\n• Former ${getCorpName(cat)} — I bring Big Tech engineering standards\n• My projects have generated $${Math.round(high*500).toLocaleString()}+ in combined business value for clients\n• Zero failed projects — 100% client satisfaction across 50+ engagements\n• I deliver production-ready code, not prototypes — saving you months of rework`;
  return out;
}

/* ── FIELD 5: Anything Else ── */
function genExtra(cat) {
  const certs = cat.certifications.map(c => `  • ${c.name} — ${c.issuer} (${c.year})`).join("\n");
  const skills = cat.skills.map(s => s.name).join(", ");
  const corp = cat.experience.find(e => !e.company.includes("Self-Employed") && !e.company.includes("Freelance"));
  const corpName = corp ? corp.company.split("—")[0].trim() : "";
  const corpRole = corp?.role || "";
  const freelance = cat.experience.find(e => e.company.includes("Self-Employed") || e.company.includes("Freelance"));
  const allTech = Object.values(cat.techStack).flat();

  let t = `━━━ PROFESSIONAL BACKGROUND ━━━\n\n`;
  if (corp) {
    t += `Former ${corpRole} at ${corpName}. Now a full-time freelance ${cat.name.toLowerCase()} specialist with 50+ successful client engagements.\n\nKey achievements at ${corpName}:\n`;
    corp.bullets.forEach(b => { t += `  • ${b}\n`; });
    t += `\n`;
  }
  if (freelance) { t += `Freelance highlights:\n`; freelance.bullets.forEach(b => { t += `  • ${b}\n`; }); t += `\n`; }

  t += `━━━ CERTIFICATIONS ━━━\n\n${certs}\n\n`;
  t += `━━━ TECHNICAL EXPERTISE ━━━\n\nCore Skills: ${skills}\n\nFull Tech Stack (${allTech.length} technologies):\n`;
  Object.entries(cat.techStack).forEach(([group, techs]) => { t += `  ${group}: ${techs.join(", ")}\n`; });
  t += `\n━━━ WHY FIVERR PRO CLIENTS CHOOSE ME ━━━\n\n`;
  t += `🏢 Enterprise Pedigree\n   Former ${corpName || "Big Tech"} engineer — I write the same quality code that powers\n   products used by millions. You get Big Tech engineering at freelance flexibility.\n\n`;
  t += `📊 Results-Driven Delivery\n   Every project I take on has measurable outcomes. I don't just write code —\n   I deliver business results. See my portfolio for case studies with real metrics.\n\n`;
  t += `🤝 Professional Communication\n   Weekly demo calls, daily async updates on Slack/Discord, milestone reports.\n   You'll always know exactly where your project stands. Zero surprises.\n\n`;
  t += `⚡ Speed Without Compromise\n   I ship fast because I've built similar systems before. But speed never comes\n   at the expense of quality — every project includes tests, docs, and code review.\n\n`;
  t += `🛡️ Risk-Free Engagement\n   • Milestone-based payments — you only pay for delivered, approved work\n   • 30-day post-delivery warranty — free bug fixes after launch\n   • Full IP transfer — you own 100% of the code and all deliverables\n   • NDA protection — your idea and business data stay confidential\n\n`;
  t += `━━━ LINKS ━━━\n\nPortfolio: https://showcase-five-psi.vercel.app\nLinkedIn: https://linkedin.com/in/shreyansh-singh-dev\nGitHub: https://github.com/mabwfas\n\nI look forward to bringing the same level of excellence to your project.\nLet's build something exceptional together.`;
  return t;
}

const FIELDS = [
  { id: "projects", label: "Notable Projects", q: "List below several of your notable projects.", gen: genProjects,
    tip: "🎯 Reviewers spend the most time here. Include specific metrics (revenue, users, performance gains). Name real projects — vague descriptions get rejected." },
  { id: "clients",  label: "Brand / Client Names", q: "List the brand or client names from the projects listed above.", gen: genClients,
    tip: "🏢 Brand-name clients = instant credibility. Include corporate employers too. NDA mentions are fine but don't make everything anonymous." },
  { id: "roles",    label: "Your Specific Role", q: "Describe your specific role in each project.", gen: genRoles,
    tip: "👤 Use \"I\" not \"we\". Fiverr Pro is about YOUR expertise. Show you owned the work end-to-end: architecture → code → testing → deployment → client communication." },
  { id: "pricing",  label: "Typical Charge", q: "How much do you typically charge for these types of projects?", gen: genPricing,
    tip: "💰 Too low = not Pro material. Justify rates with your background and results. Show tiered pricing (hourly + project + retainer) to demonstrate professionalism." },
  { id: "extra",    label: "Anything Else (Optional)", q: "Is there anything else you would like to mention?", gen: genExtra,
    tip: "⭐ This \"optional\" field is your closing argument — NEVER skip it. Include certifications, full tech stack, links to LinkedIn/GitHub/portfolio, and 3-5 reasons to hire you." }
];

/* ═══════════════════════════════
   CLIPBOARD
   ═══════════════════════════════ */
function clip(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add("ok");
    const orig = btn.innerHTML;
    btn.innerHTML = btn.classList.contains("copy-all-global") || btn.classList.contains("btn-copy-all") ? "✓ All Copied!" : "✓ Copied!";
    setTimeout(() => { btn.classList.remove("ok"); btn.innerHTML = orig; }, 2200);
  });
}

function copyField(btn, catId, fldId) {
  const c = CATEGORIES.find(x => x.id === catId);
  const f = FIELDS.find(x => x.id === fldId);
  if (c && f) clip(f.gen(c), btn);
}

function copyAllForCat(btn, catId) {
  const c = CATEGORIES.find(x => x.id === catId);
  if (!c) return;
  const txt = FIELDS.map(f => `══════ ${f.label.toUpperCase()} ══════\nQuestion: ${f.q}\n\n${f.gen(c)}`).join("\n\n\n" + "━".repeat(60) + "\n\n\n");
  clip(txt, btn);
  copiedCats.add(catId);
  updateProgress();
  const item = document.querySelector(`.sidebar-item[data-id="${catId}"]`);
  if (item) item.classList.add("copied");
}

function copyCurrentAll(btn) {
  if (currentCat) copyAllForCat(btn, currentCat.id);
}

function updateProgress() {
  const pct = Math.round((copiedCats.size / CATEGORIES.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = `${copiedCats.size} / ${CATEGORIES.length} copied`;
}

/* ═══════════════════════════════
   RENDER SIDEBAR
   ═══════════════════════════════ */
function renderSidebar() {
  const list = document.getElementById("sidebarList");
  const groups = {};
  CATEGORIES.forEach(c => { (groups[c.group] ??= []).push(c); });

  let h = "";
  Object.entries(groups).forEach(([g, cs]) => {
    h += `<div class="sidebar-group">${g}</div>`;
    cs.forEach(c => {
      h += `<div class="sidebar-item" data-id="${c.id}" onclick="selectCategory('${c.id}')">`;
      h += `<span class="icon">${c.icon}</span>`;
      h += `<span class="name">${c.name}</span>`;
      h += `<span class="check">✓</span>`;
      h += `</div>`;
    });
  });
  list.innerHTML = h;

  // Mobile select
  const sel = document.getElementById("mobileSelect");
  let sh = `<option value="">— Select Category —</option>`;
  Object.entries(groups).forEach(([g, cs]) => {
    sh += `<optgroup label="${g}">`;
    cs.forEach(c => { sh += `<option value="${c.id}">${c.icon} ${c.name}</option>`; });
    sh += `</optgroup>`;
  });
  sel.innerHTML = sh;

  // Count
  let totalWords = 0;
  CATEGORIES.forEach(c => FIELDS.forEach(f => { totalWords += wc(f.gen(c)); }));
  document.getElementById("sidebarCount").textContent = `${CATEGORIES.length} categories · ${(totalWords/1000).toFixed(1)}K words`;
  document.getElementById("stat").textContent = `${CATEGORIES.length} Categories · ${(totalWords/1000).toFixed(1)}K Words`;
}

function wc(s) { return s.split(/\s+/).filter(Boolean).length; }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ═══════════════════════════════
   SELECT CATEGORY → RENDER PANEL
   ═══════════════════════════════ */
function selectCategory(id) {
  const cat = CATEGORIES.find(c => c.id === id);
  if (!cat) return;
  currentCat = cat;

  // Update sidebar active state
  document.querySelectorAll(".sidebar-item").forEach(el => el.classList.remove("active"));
  const activeItem = document.querySelector(`.sidebar-item[data-id="${id}"]`);
  if (activeItem) { activeItem.classList.add("active"); activeItem.scrollIntoView({ block: "nearest" }); }

  // Mobile select
  document.getElementById("mobileSelect").value = id;

  // Hide empty state, show content
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("panelContent").style.display = "block";

  const allTech = Object.values(cat.techStack).flat();

  // Panel header
  document.getElementById("panelHdr").innerHTML = `
    <span class="panel-icon">${cat.icon}</span>
    <div class="panel-info">
      <div class="panel-name">${cat.name}</div>
      <div class="panel-meta">
        <span class="panel-tag">${cat.group}</span>
        <span class="panel-tag">${cat.projects.length} Projects</span>
        <span class="panel-tag">${allTech.length} Technologies</span>
        <span class="panel-tag">${cat.certifications.length} Certs</span>
      </div>
    </div>
    <span class="panel-rate">${cat.salary}</span>
  `;

  // Actions bar
  document.getElementById("panelActions").innerHTML = `
    <button class="btn-copy-all" onclick="copyAllForCat(this,'${cat.id}')">📋 Copy All 5 Answers</button>
    <span class="panel-tip">💡 Each answer is unique to <b>${cat.name}</b></span>
  `;

  // Fields
  const container = document.getElementById("fieldsContainer");
  let fh = "";
  FIELDS.forEach((f, i) => {
    const answer = f.gen(cat);
    const words = wc(answer);
    fh += `<div class="field${i === 0 ? ' open' : ''}" id="field-${f.id}">`;
    fh += `<div class="field-header" onclick="toggleField('${f.id}')">`;
    fh += `<span class="field-arrow">▶</span>`;
    fh += `<span class="field-label">${f.label}</span>`;
    fh += `<span class="field-wc">${words} words</span>`;
    fh += `<button class="field-copy" onclick="event.stopPropagation();copyField(this,'${cat.id}','${f.id}')">📋 Copy</button>`;
    fh += `</div>`;
    fh += `<div class="field-question">${f.q}</div>`;
    if (f.tip) fh += `<div class="field-tip"><div class="field-tip-inner"><span class="tip-icon">💡</span><span>${f.tip} <a href="fiverr-guide.html#field-${f.id}" target="_blank">Full guide →</a></span></div></div>`;
    fh += `<div class="field-body"><div class="field-content">${esc(answer)}</div></div>`;
    fh += `</div>`;
  });
  container.innerHTML = fh;

  // Scroll panel to top
  document.getElementById("panel").scrollTop = 0;
}

function toggleField(fldId) {
  const el = document.getElementById("field-" + fldId);
  if (el) el.classList.toggle("open");
}

/* ═══════════════════════════════
   SEARCH / FILTER
   ═══════════════════════════════ */
function filterCategories(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll(".sidebar-item").forEach(item => {
    const name = item.querySelector(".name").textContent.toLowerCase();
    item.style.display = (!q || name.includes(q)) ? "" : "none";
  });
  // Show/hide group headers
  document.querySelectorAll(".sidebar-group").forEach(grp => {
    let hasVisible = false;
    let next = grp.nextElementSibling;
    while (next && !next.classList.contains("sidebar-group")) {
      if (next.style.display !== "none") hasVisible = true;
      next = next.nextElementSibling;
    }
    grp.style.display = hasVisible ? "" : "none";
  });
}

/* ═══════════════════════════════
   KEYBOARD NAV
   ═══════════════════════════════ */
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  const items = [...document.querySelectorAll(".sidebar-item")].filter(el => el.style.display !== "none");
  const curIdx = items.findIndex(el => el.classList.contains("active"));

  if (e.key === "ArrowDown" || e.key === "j") {
    e.preventDefault();
    const next = items[curIdx + 1] || items[0];
    if (next) selectCategory(next.dataset.id);
  } else if (e.key === "ArrowUp" || e.key === "k") {
    e.preventDefault();
    const prev = items[curIdx - 1] || items[items.length - 1];
    if (prev) selectCategory(prev.dataset.id);
  } else if (e.key === "c") {
    if (currentCat) {
      const btn = document.querySelector(".btn-copy-all");
      if (btn) copyAllForCat(btn, currentCat.id);
    }
  }
});

/* ═══════════════════════════════
   INIT
   ═══════════════════════════════ */
renderSidebar();
// Auto-select first category
if (CATEGORIES.length > 0) selectCategory(CATEGORIES[0].id);
</script>
