<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiverr Pro Application Answers — Ready to Copy & Paste</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050508;--card:#0a0a12;--border:rgba(255,255,255,.06);--text:#e2e8f0;--muted:#64748b;--green:#10b981;--accent:#6366f1}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding:0}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

/* ── Header ── */
.page-header{position:sticky;top:0;z-index:100;background:rgba(5,5,8,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.page-header h1{font-size:20px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-header .sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
.back-link{color:var(--accent);font-size:13px;text-decoration:none;opacity:.7;transition:.2s}
.back-link:hover{opacity:1}

/* ── Category Nav ── */
.cat-nav{position:sticky;top:68px;z-index:99;background:rgba(5,5,8,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:thin}
.cat-nav::-webkit-scrollbar{height:4px}
.cat-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.cat-pill{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--muted);transition:all .2s}
.cat-pill:hover{border-color:rgba(99,102,241,.3);color:var(--text)}
.cat-pill.active{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.group-label{padding:6px 8px;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.2);font-weight:700;align-self:center;white-space:nowrap}

/* ── Main ── */
.main{max-width:960px;margin:0 auto;padding:24px 32px 80px}

/* ── Category Section ── */
.cat-section{margin-bottom:48px;scroll-margin-top:140px}
.cat-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.cat-icon{font-size:28px}
.cat-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.cat-rate{font-size:12px;color:var(--green);font-weight:600;margin-left:auto;background:rgba(16,185,129,.08);padding:4px 12px;border-radius:20px;border:1px solid rgba(16,185,129,.15)}

/* ── Field Card ── */
.field{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.field-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
.field-label{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
.field-q{font-size:11px;color:var(--muted);max-width:500px}
.copy-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#a5b4fc;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.copy-btn:hover{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.4)}
.copy-btn.copied{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.field-body{padding:16px;font-size:13.5px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word}

/* ── Copy All ── */
.copy-all-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;margin-bottom:20px}
.copy-all-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.3)}
.copy-all-btn.copied{background:linear-gradient(135deg,#10b981,#059669)}

/* ── Tip Box ── */
.tip{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.12);border-radius:10px;padding:14px 18px;margin-bottom:14px;font-size:12px;color:#a5b4fc;line-height:1.6}
.tip strong{color:#c7d2fe}

/* ── Footer ── */
.page-footer{text-align:center;padding:40px 32px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}

/* ── Responsive ── */
@media(max-width:700px){
  .page-header{padding:12px 16px}
  .cat-nav{padding:8px 16px}
  .main{padding:16px}
  .cat-title{font-size:18px}
}
</style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>Fiverr Pro Application Answers</h1>
    <div class="sub">Copy & Paste — Reviewer-Ready Responses for All Categories</div>
  </div>
  <a href="index.html" class="back-link">← Dashboard</a>
</div>

<div class="cat-nav" id="catNav"></div>

<div class="main" id="main">
  <div style="text-align:center;padding:60px 0;color:var(--muted)">Loading categories...</div>
</div>

<div class="page-footer">Portfolio Factory — Fiverr Pro Application Answer Generator</div>

<script src="data/categories.js"></script>
<script>
/* ═════════════════════════════════════════════
   FIVERR PRO — APPLICATION ANSWER GENERATOR
   Generates reviewer-ready answers for each
   field in the "Top Projects" section
   ═════════════════════════════════════════════ */

const FIELDS = [
  {
    id: "notable_projects",
    label: "Notable Projects",
    question: "List below several of your notable projects.",
    generate: (cat) => {
      return cat.projects.map((p, i) => {
        const num = i + 1;
        // Extract the metric from tech string (after |)
        const metric = p.tech.includes("|") ? p.tech.split("|")[1].trim() : "";
        const techOnly = p.tech.split("|")[0].trim();
        let out = `${num}. ${p.name}`;
        out += `\nTech Stack: ${techOnly}`;
        if (metric) out += `\nKey Metric: ${metric}`;
        out += `\nRole: ${p.client}`;
        out += `\n\n${p.desc}`;
        out += `\n\nBusiness Impact & Benefits:`;
        out += `\n${getProjectBenefits(cat, p, i)}`;
        return out;
      }).join("\n\n" + "—".repeat(40) + "\n\n");
    }
  },
  {
    id: "clients",
    label: "Brand / Client Names",
    question: "List the brand or client names from the projects listed above.",
    generate: (cat) => {
      const clients = cat.projects.map(p => {
        const match = p.client.match(/(?:for|at)\s+(.+)$/i);
        return match ? match[1].trim() : p.client.split("—")[1]?.trim() || p.client;
      });
      const exp = cat.experience.map(e => {
        const comp = e.company.split("—")[0].trim();
        return comp.includes("Self-Employed") ? null : comp;
      }).filter(Boolean);
      const all = [...new Set([...clients, ...exp])];
      return all.join(", ") + "\n\nI have worked with enterprises, funded startups, and government organizations. All client engagements include NDA protection — additional references available upon request.";
    }
  },
  {
    id: "role",
    label: "Your Role in Each Project",
    question: "Describe your specific role in each project.",
    generate: (cat) => {
      return cat.projects.map((p, i) => {
        const num = i + 1;
        const rolePart = p.client.split("—")[0].trim();
        const bullets = getRoleBullets(cat, p, i);
        return `${num}. ${p.name}\nRole: ${rolePart}\n\nWhat I specifically did:\n${bullets}`;
      }).join("\n\n" + "—".repeat(40) + "\n\n");
    }
  },
  {
    id: "rate",
    label: "Typical Charge",
    question: "How much do you typically charge for these types of projects?",
    generate: (cat) => {
      const rate = cat.salary;
      const low = parseInt(rate.match(/\$(\d+)/)?.[1] || "50");
      const high = parseInt(rate.match(/\$\d+[–-]\$(\d+)/)?.[1] || "200");
      const projMin = Math.round(low * 60);
      const projMid = Math.round(((low + high) / 2) * 80);
      const projHigh = Math.round(high * 120);
      return `My hourly rate is ${rate} depending on project complexity and timeline.\n\nFixed-price project ranges:\n• Small projects (2-4 weeks): $${projMin.toLocaleString()} – $${projMid.toLocaleString()}\n• Medium projects (1-3 months): $${projMid.toLocaleString()} – $${projHigh.toLocaleString()}\n• Enterprise / large-scale (3-6+ months): $${projHigh.toLocaleString()} – $${(projHigh * 2).toLocaleString()}+\n\nPricing models I offer:\n• Hourly billing — Best for ongoing development, iteration, and consulting\n• Fixed-price milestones — Best for well-scoped projects with clear deliverables\n• Monthly retainer ($${(low * 80).toLocaleString()}–$${(high * 80).toLocaleString()}/mo) — Dedicated availability, priority support, and guaranteed hours\n\nEvery engagement includes:\n✓ Detailed project scoping and technical architecture document\n✓ Milestone-based delivery with regular progress demos\n✓ Comprehensive documentation and knowledge transfer\n✓ 30-day post-delivery support and bug fixes at no additional cost\n✓ Source code ownership and IP transfer upon completion`;
    }
  },
  {
    id: "extra",
    label: "Anything Else (Optional)",
    question: "Is there anything else you would like to mention?",
    generate: (cat) => {
      const certs = cat.certifications.map(c => `• ${c.name} (${c.issuer}, ${c.year})`).join("\n");
      const skills = cat.skills.map(s => s.name).join(", ");
      const freelanceExp = cat.experience.find(e => e.company.includes("Freelance") || e.company.includes("Self-Employed"));
      const corpExp = cat.experience.find(e => !e.company.includes("Freelance") && !e.company.includes("Self-Employed"));
      const corpName = corpExp ? corpExp.company.split("—")[0].trim() : "top tech companies";
      const corpBullets = corpExp ? corpExp.bullets.slice(0, 2).map(b => `• ${b}`).join("\n") : "";

      let text = `PROFESSIONAL BACKGROUND:\nI am a seasoned ${cat.name.toLowerCase()} professional with ${corpExp ? "prior experience at " + corpName + " and" : ""} a proven track record delivering enterprise-grade solutions for Fortune 500 companies and high-growth startups.\n\nCore expertise: ${skills}.\n`;
      if (corpBullets) text += `\nHighlights from ${corpName}:\n${corpBullets}\n`;
      text += `\nINDUSTRY CERTIFICATIONS:\n${certs}\n\n`;

      text += `WHAT SETS ME APART:\n`;
      text += `• Former ${corpName || "Big Tech"} engineer — I bring enterprise-grade standards to every project\n`;
      text += `• 100% on-time delivery record across 50+ freelance projects\n`;
      text += `• End-to-end ownership: architecture → development → testing → deployment → support\n`;
      text += `• Clear, proactive communication — weekly demos, daily async updates, zero surprises\n`;
      text += `• Clean, documented, production-ready code with comprehensive test coverage\n`;
      text += `• Post-delivery support: 30 days of bug fixes + knowledge transfer included\n\n`;

      text += `WORK STYLE:\n`;
      text += `• Available for real-time collaboration across time zones\n`;
      text += `• Agile methodology with sprint-based delivery and regular demos\n`;
      text += `• Comprehensive documentation and knowledge transfer included\n`;
      text += `• NDA and IP assignment agreements available upon request\n\n`;

      text += `PORTFOLIO: https://showcase-five-psi.vercel.app\nLinkedIn: https://linkedin.com/in/shreyansh-singh-dev`;

      return text;
    }
  }
];

function getProjectBenefits(cat, project, idx) {
  const metric = project.tech.includes("|") ? project.tech.split("|")[1].trim() : "";
  const benefits = [];

  // Extract numbers from desc for concrete benefits
  const nums = project.desc.match(/\d[\d,.]*[%+KMB]?/g) || [];

  benefits.push(`• Delivered production-grade solution now actively used in production`);
  if (metric) benefits.push(`• Achieved: ${metric}`);

  // Category-specific benefits
  const name = cat.name.toLowerCase();
  if (name.includes("ai") || name.includes("chatbot")) {
    benefits.push(`• Reduced manual workload by 60-80% through intelligent automation`);
    benefits.push(`• Improved accuracy/resolution rates to 90%+ with continuous model tuning`);
  } else if (name.includes("blockchain") || name.includes("crypto") || name.includes("token")) {
    benefits.push(`• Smart contracts audited by leading security firms — zero exploits post-deployment`);
    benefits.push(`• Gas-optimized contracts saving users significant transaction costs`);
  } else if (name.includes("mobile")) {
    benefits.push(`• Achieved 4.8+ star rating on App Store / Google Play`);
    benefits.push(`• Sub-2 second cold start time with optimized performance across all devices`);
  } else if (name.includes("cloud") || name.includes("devops")) {
    benefits.push(`• Reduced infrastructure costs by 35-70% through architecture optimization`);
    benefits.push(`• Achieved 99.99%+ uptime with automated failover and disaster recovery`);
  } else if (name.includes("cyber") || name.includes("security")) {
    benefits.push(`• Identified and remediated critical vulnerabilities before exploitation`);
    benefits.push(`• Achieved SOC 2 / ISO 27001 compliance within accelerated timelines`);
  } else if (name.includes("game")) {
    benefits.push(`• Optimized to 60fps on mid-range devices with custom rendering pipeline`);
    benefits.push(`• Player retention improved 40%+ through data-driven gameplay tuning`);
  } else if (name.includes("web") && name.includes("dev")) {
    benefits.push(`• Core Web Vitals all green — 95+ Lighthouse performance score`);
    benefits.push(`• SEO-optimized architecture driving 3x organic traffic growth`);
  } else if (name.includes("qa") || name.includes("test")) {
    benefits.push(`• Reduced regression testing time by 90%+ with parallel automation`);
    benefits.push(`• Caught critical bugs before production — zero P0 incidents post-launch`);
  } else if (name.includes("software")) {
    benefits.push(`• Sub-50ms P99 latency with auto-scaling handling 10x traffic spikes`);
    benefits.push(`• Clean architecture enabling team velocity increase of 40%+`);
  } else if (name.includes("trading")) {
    benefits.push(`• Generated consistent alpha with sub-millisecond execution latency`);
    benefits.push(`• Risk management system preventing catastrophic losses with real-time monitoring`);
  } else if (name.includes("design")) {
    benefits.push(`• Increased user engagement by 45%+ through intuitive UX design`);
    benefits.push(`• Pixel-perfect implementation matching design specs with zero deviation`);
  } else if (name.includes("seo") || name.includes("marketing")) {
    benefits.push(`• Achieved 200-500% increase in organic traffic within 6 months`);
    benefits.push(`• Improved conversion rates by 35%+ through data-driven optimization`);
  } else {
    benefits.push(`• Delivered on time and within budget with zero scope creep`);
    benefits.push(`• Client satisfaction: 5/5 rating with repeat engagement`);
  }

  benefits.push(`• Full documentation, knowledge transfer, and post-delivery support provided`);
  return benefits.join("\n");
}

function getRoleBullets(cat, project, idx) {
  const exp = cat.experience[0]; // freelance
  if (!exp) return "";
  const bullets = [
    `• Led end-to-end technical architecture, system design, and implementation from scratch`,
    `• Made all key technology stack decisions — selected frameworks, databases, and infrastructure`,
    `• Personally wrote 80%+ of core business logic, algorithms, and critical system components`,
    `• Designed database schemas, API contracts, and system integration architecture`,
  ];
  // Add project-specific bullet
  if (project.tech.includes("|")) {
    const metric = project.tech.split("|")[1].trim();
    bullets.push(`• Delivered measurable business impact: ${metric}`);
  }
  bullets.push(`• Owned client communication: requirements gathering, sprint demos, and milestone sign-offs`);
  bullets.push(`• Wrote comprehensive technical documentation and performed knowledge transfer`);
  return bullets.join("\n");
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add("copied");
    const orig = btn.innerHTML;
    btn.innerHTML = "✓ Copied!";
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = orig;
    }, 2000);
  });
}

function copyAllForCategory(cat) {
  const sections = FIELDS.map(f => {
    return `=== ${f.label.toUpperCase()} ===\n${f.question}\n\n${f.generate(cat)}`;
  });
  return sections.join("\n\n" + "─".repeat(50) + "\n\n");
}

function render() {
  const nav = document.getElementById("catNav");
  const main = document.getElementById("main");

  // Group categories
  const groups = {};
  CATEGORIES.forEach(c => {
    if (!groups[c.group]) groups[c.group] = [];
    groups[c.group].push(c);
  });

  // Nav pills
  let navHtml = "";
  Object.entries(groups).forEach(([group, cats]) => {
    navHtml += `<span class="group-label">${group}</span>`;
    cats.forEach(c => {
      navHtml += `<span class="cat-pill" data-id="${c.id}" onclick="scrollToCat('${c.id}')">${c.icon} ${c.name}</span>`;
    });
  });
  nav.innerHTML = navHtml;

  // Main content
  let html = "";
  CATEGORIES.forEach(cat => {
    html += `<div class="cat-section" id="cat-${cat.id}">`;
    html += `<div class="cat-header">`;
    html += `<span class="cat-icon">${cat.icon}</span>`;
    html += `<span class="cat-title">${cat.name}</span>`;
    html += `<span class="cat-rate">${cat.salary}</span>`;
    html += `</div>`;

    // Copy All button
    html += `<button class="copy-all-btn" onclick="copyAll(this, '${cat.id}')">📋 Copy All Answers for ${cat.name}</button>`;

    // Tip
    html += `<div class="tip"><strong>Pro Tip:</strong> Copy each field individually or use "Copy All" above. Each answer is written to impress Fiverr Pro reviewers with specific metrics, client names, and technical depth.</div>`;

    // Fields
    FIELDS.forEach(f => {
      const answer = f.generate(cat);
      const escapedAnswer = answer.replace(/'/g, "\\'").replace(/\n/g, "\\n");
      html += `<div class="field">`;
      html += `<div class="field-header">`;
      html += `<div><div class="field-label">${f.label}</div><div class="field-q">${f.question}</div></div>`;
      html += `<button class="copy-btn" onclick="copyField(this, '${cat.id}', '${f.id}')">📋 Copy</button>`;
      html += `</div>`;
      html += `<div class="field-body" id="field-${cat.id}-${f.id}">${escapeHtml(answer)}</div>`;
      html += `</div>`;
    });

    html += `</div>`;
  });

  main.innerHTML = html;

  // Intersection observer for nav highlights
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id.replace("cat-", "");
        document.querySelectorAll(".cat-pill").forEach(p => p.classList.remove("active"));
        const pill = document.querySelector(`.cat-pill[data-id="${id}"]`);
        if (pill) {
          pill.classList.add("active");
          pill.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
        }
      }
    });
  }, { rootMargin: "-140px 0px -60% 0px" });

  document.querySelectorAll(".cat-section").forEach(s => observer.observe(s));
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function scrollToCat(id) {
  document.getElementById("cat-" + id)?.scrollIntoView({ behavior: "smooth" });
}

function copyField(btn, catId, fieldId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const field = FIELDS.find(f => f.id === fieldId);
  if (cat && field) {
    copyToClipboard(field.generate(cat), btn);
  }
}

function copyAll(btn, catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (cat) {
    copyToClipboard(copyAllForCategory(cat), btn);
    btn.classList.add("copied");
    const orig = btn.innerHTML;
    btn.innerHTML = "✓ All Answers Copied!";
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = orig;
    }, 2500);
  }
}

render();
</script>
</body>
</html>
